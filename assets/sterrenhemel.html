<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fien's Sterrenhemel ✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(ellipse at center, #1a0033 0%, #000010 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* twinkelende sterren achtergrond */
  .bg-stars {
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff, transparent),
      radial-gradient(1px 1px at 30% 80%, #fff, transparent),
      radial-gradient(1px 1px at 70% 40%, #fff, transparent),
      radial-gradient(1px 1px at 90% 70%, #fff, transparent),
      radial-gradient(2px 2px at 50% 50%, #B100FF, transparent),
      radial-gradient(1px 1px at 20% 60%, #00AFFF, transparent);
    animation: twinkle 5s infinite;
    z-index: 0; pointer-events: none;
  }
  @keyframes twinkle { 0%,100%{opacity:.5} 50%{opacity:1} }

  .container {
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px;
  }

  header {
    text-align: center;
    padding: 16px 12px 22px;
  }
  h1 {
    font-size: 30px;
    color: #FF2EB3;
    text-shadow: 0 0 20px #FF2EB3, 0 0 40px #FF2EB3;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #00AFFF;
    text-shadow: 0 0 10px #00AFFF;
    font-size: 15px;
  }

  /* tabs */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .tab {
    background: rgba(177, 0, 255, 0.15);
    border: 2px solid #B100FF;
    color: #fff;
    padding: 10px 16px;
    border-radius: 50px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .tab.active {
    background: linear-gradient(135deg, #B100FF, #FF2EB3);
    box-shadow: 0 0 20px rgba(255, 46, 179, 0.6);
  }
  .tab:hover { transform: translateY(-2px); }

  /* sterrenhemel canvas */
  .sky {
    position: relative;
    height: 520px;
    background: radial-gradient(ellipse at center, rgba(177,0,255,0.12), transparent 70%);
    border: 2px solid rgba(177, 0, 255, 0.4);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: inset 0 0 60px rgba(177, 0, 255, 0.15);
  }
  .sky-empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: rgba(255,255,255,0.4);
    font-size: 16px;
    pointer-events: none;
  }
  .sky-empty .big-emoji {
    font-size: 60px;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 20px #B100FF);
  }

  /* een ster */
  .star {
    position: absolute;
    width: 60px;
    height: 60px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: all 0.3s;
  }
  .star:hover { transform: translate(-50%, -50%) scale(1.3); z-index: 10; }
  .star-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    pointer-events: none;
  }
  .star-img {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    object-fit: cover;
    width: 100%; height: 100%;
    border: 2px solid #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.5);
  }

  /* glow varianten op basis van openings-aantal */
  .star.glow-1 .star-img { box-shadow: 0 0 8px #00AFFF; border-color: #00AFFF; }
  .star.glow-2 .star-img { box-shadow: 0 0 16px #B100FF, 0 0 30px #B100FF; border-color: #B100FF; }
  .star.glow-3 .star-img { box-shadow: 0 0 22px #FF2EB3, 0 0 40px #FF2EB3; border-color: #FF2EB3; }
  .star.glow-4 .star-img { box-shadow: 0 0 28px #FFD700, 0 0 50px #FFD700, 0 0 80px #FFD700; border-color: #FFD700; }
  .star.dark .star-img {
    filter: brightness(0.3) saturate(0.4);
    border-color: #444;
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
  }

  /* foto van de dag = supernova */
  .star.daystar {
    width: 100px; height: 100px;
    z-index: 5;
    animation: supernova 3s infinite;
  }
  @keyframes supernova {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.1); }
  }
  .star.daystar .star-img {
    border: 4px solid #FFD700;
    box-shadow: 0 0 30px #FFD700, 0 0 60px #FFD700, 0 0 100px #FF2EB3;
  }
  .star.daystar::before {
    content: '⭐';
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    filter: drop-shadow(0 0 10px #FFD700);
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-6px); }
  }

  /* upload-knoppen onder hemel */
  .actions {
    margin-top: 18px;
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr 1fr 1fr;
  }
  .action-btn {
    background: linear-gradient(135deg, rgba(177, 0, 255, 0.3), rgba(255, 46, 179, 0.3));
    border: 2px solid #FF2EB3;
    color: #fff;
    padding: 14px 10px;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
    box-shadow: 0 0 12px rgba(255, 46, 179, 0.3);
  }
  .action-btn:hover { transform: translateY(-2px); box-shadow: 0 0 22px rgba(255, 46, 179, 0.7); }
  .action-btn .emoji { font-size: 24px; display: block; margin-bottom: 4px; }
  .action-btn.dark { border-color: #FF3366; }
  .action-btn.gold { border-color: #FFD700; box-shadow: 0 0 14px rgba(255,215,0,0.4); }
  input[type="file"] { display: none; }

  /* counters */
  .counters {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
  }
  .counter strong { color: #FF2EB3; }

  /* modal: foto open */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 14px;
    backdrop-filter: blur(8px);
  }
  .modal.show { display: flex; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal-box {
    background: rgba(20, 0, 40, 0.95);
    border: 2px solid #FF2EB3;
    border-radius: 22px;
    padding: 22px;
    max-width: 500px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 0 40px rgba(255, 46, 179, 0.5);
  }
  .modal-img {
    width: 100%;
    max-height: 280px;
    object-fit: contain;
    border-radius: 14px;
    margin-bottom: 14px;
    border: 2px solid #B100FF;
  }
  .modal h3 {
    color: #FFD700;
    text-shadow: 0 0 12px #FFD700;
    text-align: center;
    margin-bottom: 8px;
    font-size: 18px;
  }
  .modal-info {
    text-align: center;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    margin-bottom: 14px;
  }
  .modal-reaction {
    background: rgba(0, 175, 255, 0.15);
    border-left: 3px solid #00AFFF;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 14px;
    font-size: 15px;
    line-height: 1.4;
  }
  .modal-reaction.empty { color: rgba(255,255,255,0.4); font-style: italic; }
  .modal-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .modal-actions button {
    flex: 1;
    min-width: 100px;
    background: rgba(177, 0, 255, 0.3);
    border: 1px solid #B100FF;
    color: #fff;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.2s;
  }
  .modal-actions button:hover { background: rgba(177, 0, 255, 0.5); }
  .modal-actions .danger { border-color: #FF3366; color: #FF99AA; }
  .modal-actions .danger:hover { background: rgba(255, 51, 102, 0.3); }
  .modal-actions .gold { border-color: #FFD700; color: #FFD700; }
  .modal-actions .gold:hover { background: rgba(255, 215, 0, 0.2); }

  /* reactie scherm */
  .reaction-screen {
    text-align: center;
  }
  .reaction-screen h3 { font-size: 22px; margin-bottom: 6px; }
  .react-img {
    width: 100%;
    max-width: 320px;
    border-radius: 14px;
    margin: 10px auto;
    border: 3px solid #FFD700;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    display: block;
  }
  .react-question {
    color: #00AFFF;
    text-shadow: 0 0 10px #00AFFF;
    font-size: 17px;
    margin: 14px 0;
  }

  /* 3 uitwegen */
  .ways {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .way-btn {
    background: rgba(0,0,0,0.4);
    border: 2px solid #B100FF;
    color: #fff;
    padding: 14px 8px;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .way-btn .way-emoji { font-size: 28px; display: block; margin-bottom: 4px; }
  .way-btn.active {
    background: linear-gradient(135deg, #B100FF, #FF2EB3);
    box-shadow: 0 0 18px rgba(255, 46, 179, 0.6);
  }
  .way-btn:hover { transform: translateY(-2px); }

  .way-content { min-height: 100px; }

  /* spraak */
  .mic-area { text-align: center; padding: 16px; }
  .mic-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid #FF2EB3;
    background: radial-gradient(circle, #B100FF, #5A0080);
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(255, 46, 179, 0.5);
  }
  .mic-btn:hover { transform: scale(1.05); }
  .mic-btn.recording {
    animation: recPulse 1s infinite;
    background: radial-gradient(circle, #FF3366, #800020);
    border-color: #FF3366;
  }
  @keyframes recPulse {
    0%, 100% { box-shadow: 0 0 20px #FF3366; }
    50% { box-shadow: 0 0 50px #FF3366, 0 0 80px #FF3366; }
  }
  .mic-status {
    margin-top: 10px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    font-style: italic;
  }

  /* type */
  .type-area textarea {
    width: 100%;
    min-height: 80px;
    background: rgba(0,0,0,0.5);
    border: 2px solid #B100FF;
    border-radius: 12px;
    color: #fff;
    padding: 12px;
    font-family: inherit;
    font-size: 15px;
    resize: vertical;
  }
  .type-area textarea:focus { outline: none; border-color: #FF2EB3; box-shadow: 0 0 14px rgba(255, 46, 179, 0.4); }

  /* klik */
  .smileys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .smiley-btn {
    background: rgba(177,0,255,0.2);
    border: 2px solid #B100FF;
    color: #fff;
    padding: 10px 4px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    transition: all 0.2s;
  }
  .smiley-btn:hover { background: rgba(177,0,255,0.5); transform: scale(1.05); }
  .smiley-btn.picked { background: linear-gradient(135deg, #B100FF, #FF2EB3); box-shadow: 0 0 12px rgba(255,46,179,0.6); }
  .smiley-btn .smiley-emoji { font-size: 22px; display: block; margin-bottom: 2px; }

  .save-btn {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    color: #000;
    border: none;
    padding: 14px 22px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    margin-top: 12px;
    box-shadow: 0 0 18px rgba(255, 215, 0, 0.5);
    font-family: inherit;
  }
  .save-btn:hover { transform: scale(1.02); box-shadow: 0 0 28px rgba(255, 215, 0, 0.8); }

  .live-text {
    background: rgba(0, 175, 255, 0.15);
    border-radius: 8px;
    padding: 10px;
    margin-top: 10px;
    font-size: 14px;
    min-height: 36px;
    color: #fff;
  }
  .live-text:empty::before {
    content: '...';
    color: rgba(255,255,255,0.3);
  }

  @media (max-width: 600px) {
    h1 { font-size: 22px; }
    .actions { grid-template-columns: 1fr 1fr; }
    .actions .gold { grid-column: 1 / -1; }
    .sky { height: 420px; }
  }
</style>
</head>
<body>
<div class="bg-stars"></div>
<div class="container">
  <header>
    <h1>FIEN'S STERRENHEMEL ✨</h1>
    <div class="subtitle">Elke foto = een ster · hoe vaker je hem opent, hoe feller hij gloeit</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="setTab('all')">🌌 Alles</button>
    <button class="tab" onclick="setTab('happy')">⭐ Glimlach-sterren</button>
    <button class="tab" onclick="setTab('dark')">🌑 Donkere sterren</button>
  </div>

  <div class="sky" id="sky">
    <div class="sky-empty" id="empty">
      <div class="big-emoji">✨</div>
      <div>Nog geen sterren aan de hemel</div>
      <div style="font-size:13px;margin-top:6px">Voeg een foto toe om te beginnen</div>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn" onclick="addPhoto('happy')">
      <span class="emoji">⭐</span>Glimlach-foto<br><small>(max 5)</small>
    </button>
    <button class="action-btn dark" onclick="addPhoto('dark')">
      <span class="emoji">🌑</span>Niet-zo-leuk<br><small>(max 3)</small>
    </button>
    <button class="action-btn gold" onclick="addPhoto('day')">
      <span class="emoji">🌟</span>Foto van de Dag<br><small>(1 per dag)</small>
    </button>
  </div>

  <div class="counters">
    <div class="counter">⭐ Glimlach: <strong id="cnt-happy">0/5</strong></div>
    <div class="counter">🌑 Donker: <strong id="cnt-dark">0/3</strong></div>
    <div class="counter">🌟 Vandaag: <strong id="cnt-day">geen</strong></div>
  </div>
</div>

<input type="file" id="filein" accept="image/*">

<!-- modal: foto bekijken -->
<div class="modal" id="modal">
  <div class="modal-box" id="modal-content"></div>
</div>

<script>
// ===== state =====
let stars = JSON.parse(localStorage.getItem('fien_stars') || '[]');
let dayStarId = localStorage.getItem('fien_daystar') || null;
let pendingType = null;
let currentTab = 'all';

function save() {
  localStorage.setItem('fien_stars', JSON.stringify(stars));
  if (dayStarId) localStorage.setItem('fien_daystar', dayStarId);
  else localStorage.removeItem('fien_daystar');
}

// ===== rendering =====
function getGlowClass(opens) {
  if (opens === 0) return 'glow-1';
  if (opens <= 2) return 'glow-2';
  if (opens <= 5) return 'glow-3';
  return 'glow-4';
}

function render() {
  const sky = document.getElementById('sky');
  const empty = document.getElementById('empty');
  // verwijder bestaande sterren
  sky.querySelectorAll('.star').forEach(s => s.remove());

  let visible = stars.filter(s => {
    if (currentTab === 'all') return true;
    return s.type === currentTab;
  });

  empty.style.display = visible.length === 0 ? 'flex' : 'none';

  visible.forEach((s, idx) => {
    const isDayStar = s.id === dayStarId;
    const star = document.createElement('div');
    star.className = 'star';

    if (isDayStar) {
      star.classList.add('daystar');
      star.style.left = '50%';
      star.style.top = '50%';
    } else {
      star.style.left = s.x + '%';
      star.style.top = s.y + '%';
      if (s.type === 'dark') {
        star.classList.add('dark');
      } else {
        star.classList.add(getGlowClass(s.opens || 0));
      }
    }

    star.innerHTML = `<img class="star-img" src="${s.img}" alt="">`;
    star.onclick = () => openStar(s.id);
    sky.appendChild(star);
  });

  updateCounters();
}

function updateCounters() {
  document.getElementById('cnt-happy').textContent =
    stars.filter(s => s.type === 'happy').length + '/5';
  document.getElementById('cnt-dark').textContent =
    stars.filter(s => s.type === 'dark').length + '/3';
  document.getElementById('cnt-day').textContent =
    dayStarId ? '✓' : 'geen';
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

// ===== add photo =====
function addPhoto(type) {
  if (type === 'happy' && stars.filter(s => s.type === 'happy').length >= 5) {
    alert('Glimlach-muur zit vol! Verwijder er eerst eentje.'); return;
  }
  if (type === 'dark' && stars.filter(s => s.type === 'dark').length >= 3) {
    alert('🚽 De Niet-zo-Leuk Bak is vol! Eerst doorspoelen voor je nieuwe foto kunt toevoegen.'); return;
  }
  pendingType = type;
  document.getElementById('filein').click();
}

document.getElementById('filein').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const id = Date.now().toString();
    const newStar = {
      id, img: ev.target.result, type: pendingType,
      x: 15 + Math.random() * 70, y: 15 + Math.random() * 70,
      opens: 0, reaction: null, reactionType: null,
      added: new Date().toISOString()
    };
    stars.push(newStar);
    if (pendingType === 'day') {
      dayStarId = id;
      save(); render();
      // direct reactie vragen voor foto van de dag
      setTimeout(() => openStar(id, true), 400);
    } else {
      save(); render();
    }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// ===== open star =====
function openStar(id, askReaction = false) {
  const s = stars.find(x => x.id === id);
  if (!s) return;
  if (s.type !== 'dark') s.opens = (s.opens || 0) + 1;
  save();

  const isDay = s.id === dayStarId;
  const modal = document.getElementById('modal');
  const content = document.getElementById('modal-content');

  if (isDay && (askReaction || !s.reaction)) {
    showReactionScreen(s);
  } else {
    showStarView(s);
  }
  modal.classList.add('show');
  render();
}

function showStarView(s) {
  const isDay = s.id === dayStarId;
  const typeLabel = s.type === 'happy' ? '⭐ Glimlach-ster' : s.type === 'dark' ? '🌑 Donkere ster' : '🌟 Foto van de Dag';
  let reactionHtml = '';
  if (s.reaction) {
    reactionHtml = `<div class="modal-reaction">${s.reaction}</div>`;
  } else if (isDay) {
    reactionHtml = `<div class="modal-reaction empty">Nog geen reactie...</div>`;
  }
  document.getElementById('modal-content').innerHTML = `
    <h3>${typeLabel}</h3>
    <div class="modal-info">
      ${s.type !== 'dark' ? `Geopend: ${s.opens}× · ` : ''}Helderheid: ${s.type === 'dark' ? '🌑 dof' : '✨'.repeat(Math.min(4, Math.floor((s.opens||0)/2)+1))}
    </div>
    <img src="${s.img}" class="modal-img" alt="">
    ${reactionHtml}
    <div class="modal-actions">
      ${isDay ? `<button class="gold" onclick="showReactionScreen(stars.find(x=>x.id==='${s.id}'))">${s.reaction ? '✏️ Reactie aanpassen' : '🎤 Reactie geven'}</button>` : ''}
      ${!isDay && s.type === 'happy' ? `<button class="gold" onclick="makeDayStar('${s.id}')">🌟 Maak foto van de dag</button>` : ''}
      <button class="danger" onclick="removeStar('${s.id}')">🗑️ Verwijderen</button>
      <button onclick="closeModal()">Sluiten</button>
    </div>
  `;
}

function makeDayStar(id) {
  dayStarId = id;
  save();
  closeModal();
  render();
  setTimeout(() => openStar(id, true), 300);
}

function removeStar(id) {
  if (!confirm('Verwijderen?')) return;
  stars = stars.filter(s => s.id !== id);
  if (dayStarId === id) dayStarId = null;
  save();
  closeModal();
  render();
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  if (recognition) try { recognition.stop(); } catch(e) {}
}

// ===== reactie scherm =====
let activeWay = 'speak';
let recognition = null;
let liveText = '';
let pickedSmileys = [];

function showReactionScreen(s) {
  activeWay = 'speak';
  liveText = s.reaction && s.reactionType === 'speak' ? s.reaction : '';
  pickedSmileys = s.reaction && s.reactionType === 'smileys' ? s.reaction.split(' ') : [];
  const typedDefault = s.reaction && s.reactionType === 'type' ? s.reaction : '';

  document.getElementById('modal-content').innerHTML = `
    <div class="reaction-screen">
      <h3 style="color:#FFD700;text-shadow:0 0 12px #FFD700;">🌟 Foto van de Dag</h3>
      <img src="${s.img}" class="react-img" alt="">
      <div class="react-question">Wat was er bijzonder vandaag?</div>

      <div class="ways">
        <button class="way-btn active" data-way="speak" onclick="setWay('speak', '${s.id}')">
          <span class="way-emoji">🎤</span>Inspreken
        </button>
        <button class="way-btn" data-way="type" onclick="setWay('type', '${s.id}')">
          <span class="way-emoji">⌨️</span>Tikken
        </button>
        <button class="way-btn" data-way="smileys" onclick="setWay('smileys', '${s.id}')">
          <span class="way-emoji">😊</span>Klikken
        </button>
      </div>

      <div class="way-content" id="way-content"></div>

      <button class="save-btn" onclick="saveReaction('${s.id}')">💾 Bewaar reactie</button>
      <button onclick="showStarView(stars.find(x=>x.id==='${s.id}'))" style="background:none;border:none;color:#aaa;margin-top:10px;cursor:pointer;font-family:inherit;">← Terug</button>
    </div>
  `;
  // store typed text for restoring
  window._typedDefault = typedDefault;
  renderWay();
}

function setWay(way, sid) {
  activeWay = way;
  document.querySelectorAll('.way-btn').forEach(b => b.classList.toggle('active', b.dataset.way === way));
  if (recognition) try { recognition.stop(); } catch(e) {}
  renderWay();
}

function renderWay() {
  const c = document.getElementById('way-content');
  if (activeWay === 'speak') {
    const supported = ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window);
    if (!supported) {
      c.innerHTML = `<div class="modal-reaction empty">⚠️ Inspreken werkt niet op deze browser. Gebruik Chrome of Edge, of kies "Tikken" of "Klikken".</div>`;
      return;
    }
    c.innerHTML = `
      <div class="mic-area">
        <button class="mic-btn" id="micbtn" onclick="toggleMic()">🎤</button>
        <div class="mic-status" id="micstatus">Druk op de mic om te beginnen</div>
        <div class="live-text" id="livetext">${liveText}</div>
      </div>
    `;
  } else if (activeWay === 'type') {
    c.innerHTML = `
      <div class="type-area">
        <textarea id="typetxt" placeholder="Typ wat je wil zeggen...">${window._typedDefault || ''}</textarea>
      </div>
    `;
  } else if (activeWay === 'smileys') {
    const opts = [
      ['😄','Blij'],['🥰','Lief'],['🤣','Lol'],['😎','Stoer'],
      ['😴','Moe'],['😡','Boos'],['😢','Verdrietig'],['😱','Geschrokken'],
      ['🥺','Onzeker'],['🤔','Vreemd'],['💪','Sterk'],['❤️','Liefde']
    ];
    c.innerHTML = `
      <div class="smileys">
        ${opts.map(([e,l]) => `<button class="smiley-btn ${pickedSmileys.includes(e+l) ? 'picked' : ''}" data-key="${e}${l}" onclick="toggleSmiley('${e}','${l}')"><span class="smiley-emoji">${e}</span>${l}</button>`).join('')}
      </div>
      <div style="text-align:center;font-size:13px;color:rgba(255,255,255,0.6);margin-top:6px;">Tik aan zoveel je wil</div>
    `;
  }
}

function toggleSmiley(emoji, label) {
  const key = emoji + label;
  if (pickedSmileys.includes(key)) {
    pickedSmileys = pickedSmileys.filter(x => x !== key);
  } else {
    pickedSmileys.push(key);
  }
  document.querySelectorAll('.smiley-btn').forEach(b => {
    b.classList.toggle('picked', pickedSmileys.includes(b.dataset.key));
  });
}

function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  const btn = document.getElementById('micbtn');
  const status = document.getElementById('micstatus');
  const live = document.getElementById('livetext');

  if (recognition && recognition._isActive) {
    recognition.stop();
    return;
  }

  recognition = new SR();
  recognition.lang = 'nl-NL';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition._isActive = true;

  recognition.onstart = () => {
    btn.classList.add('recording');
    btn.textContent = '⏹';
    status.textContent = '🎙️ Aan het luisteren...';
  };
  recognition.onresult = (e) => {
    let text = '';
    for (let i = 0; i < e.results.length; i++) {
      text += e.results[i][0].transcript;
    }
    liveText = text;
    live.textContent = text;
  };
  recognition.onend = () => {
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    status.textContent = liveText ? '✓ Klaar. Druk weer voor opnieuw.' : 'Druk op de mic om te beginnen';
    recognition._isActive = false;
  };
  recognition.onerror = (e) => {
    status.textContent = '❌ Fout: ' + e.error;
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    recognition._isActive = false;
  };
  recognition.start();
}

function saveReaction(id) {
  const s = stars.find(x => x.id === id);
  if (!s) return;
  if (activeWay === 'speak') {
    s.reaction = liveText.trim();
    s.reactionType = 'speak';
  } else if (activeWay === 'type') {
    const txt = document.getElementById('typetxt').value.trim();
    s.reaction = txt;
    s.reactionType = 'type';
  } else {
    s.reaction = pickedSmileys.map(k => k.charAt(0) + ' ' + k.slice(1)).join('  ');
    s.reactionType = 'smileys';
  }
  if (!s.reaction) {
    alert('Geen reactie ingevuld. Probeer iets, of klik op een smiley.');
    return;
  }
  save();
  showStarView(s);
}

// click outside modal closes
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

render();
</script>
</body>
</html>
