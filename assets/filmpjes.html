<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fienoes' Filmpjes</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(ellipse at center, #1a0833, #050010);
  color: #fff; min-height: 100vh; padding: 20px;
}
h1 {
  text-align: center; font-size: 22px; color: #B100FF;
  text-shadow: 0 0 18px #B100FF; margin-bottom: 24px; letter-spacing: 2px;
}
.video-section {
  margin-bottom: 36px;
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(177,0,255,0.4);
  border-radius: 16px; padding: 20px;
}
.video-title {
  font-size: 18px; font-weight: bold; color: #B100FF;
  text-shadow: 0 0 10px #B100FF; margin-bottom: 8px;
}
.video-desc {
  font-size: 13px; color: #aaa; margin-bottom: 14px; line-height: 1.5;
}
video {
  width: 100%; border-radius: 14px;
  border: 2px solid #B100FF;
  box-shadow: 0 0 25px rgba(177,0,255,0.4);
  background: #000; display: block;
}
</style>
</head>
<body>
<h1>🎬 FIENOES' FILMPJES</h1>

<div class="video-section">
  <div class="video-title">💥 Madness Juice — Workshop Accident</div>
  <div class="video-desc">Fienoes in de werkplaats... wat kan er fout gaan? Alles. Maar op de coolste manier.</div>
  <video controls preload="metadata">
    <source src="madness-juice.mp4" type="video/mp4">
    Je browser ondersteunt geen video.
  </video>
</div>

<div class="video-section">
  <div class="video-title">🚿 Fienoes in de WC!</div>
  <div class="video-desc">Oeps! Fienoes plonst weer. Kijk maar... hij kan er niets aan doen. 😂</div>
  <video controls preload="metadata">
    <source src="fienoes-wc.mp4" type="video/mp4">
    Je browser ondersteunt geen video.
  </video>
</div>

<!-- VOICE BUTTON -->
<div id="voice-bar" style="position:fixed;bottom:16px;right:16px;z-index:999;display:flex;gap:8px;align-items:center;">
  <button id="voice-btn" onclick="toggleVoice()" style="background:linear-gradient(135deg,#B100FF,#FF2EB3);color:#fff;border:none;padding:10px 18px;border-radius:50px;font-size:14px;font-weight:bold;cursor:pointer;box-shadow:0 0 15px rgba(177,0,255,0.5);">🔊 Lees voor</button>
  <button id="voice-stop" onclick="stopVoice()" style="display:none;background:rgba(0,0,0,0.6);color:#fff;border:2px solid #FF2EB3;padding:8px 14px;border-radius:50px;font-size:13px;cursor:pointer;">⏹ Stop</button>
</div>
<script>
const VOICE_TEXT = `Welkom bij Fienoes Filmpjes! Hier vind je twee korte films. In de eerste film beleeft Fienoes een avontuur in de werkplaats. In de tweede film... tja, Fienoes plonst weer. Veel kijkplezier!`;
let synth = window.speechSynthesis;
let speaking = false;
function getVoice() {
  const v = synth.getVoices();
  return v.find(x => x.lang==='nl-NL'||x.lang==='nl-BE'||x.lang.startsWith('nl')) || v[0];
}
function toggleVoice() { if(speaking){stopVoice();return;} startVoice(); }
function startVoice() {
  if(synth.speaking) synth.cancel();
  const u = new SpeechSynthesisUtterance(VOICE_TEXT);
  u.lang='nl-NL'; u.rate=0.95; u.pitch=1.05;
  const voice=getVoice(); if(voice) u.voice=voice;
  u.onstart=()=>{ speaking=true; document.getElementById('voice-btn').textContent='⏸ Pauze'; document.getElementById('voice-stop').style.display='inline-block'; };
  u.onend=u.onerror=()=>{ speaking=false; document.getElementById('voice-btn').textContent='🔊 Lees voor'; document.getElementById('voice-stop').style.display='none'; };
  synth.speak(u);
}
function stopVoice() { synth.cancel(); speaking=false; document.getElementById('voice-btn').textContent='🔊 Lees voor'; document.getElementById('voice-stop').style.display='none'; }
if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=()=>{};
<\/script>

</body>
</html>
