<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fienoes Plonst!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(ellipse at center, #1a0833, #050010);
  color: #fff; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 20px; text-align: center;
}
h1 {
  font-size: 28px; color: #FF2EB3;
  text-shadow: 0 0 20px #FF2EB3; margin-bottom: 8px; letter-spacing: 2px;
}
.sub {
  font-size: 14px; color: #aaa; margin-bottom: 24px;
}
img {
  max-width: 100%; width: 700px; border-radius: 20px;
  border: 3px solid #FF2EB3;
  box-shadow: 0 0 30px rgba(255,46,179,0.5);
}
.caption {
  margin-top: 20px; font-size: 16px; color: #FF2EB3;
  text-shadow: 0 0 10px #FF2EB3; font-style: italic;
}
.badge {
  margin-top: 16px;
  background: rgba(255,46,179,0.15);
  border: 2px solid #FF2EB3;
  border-radius: 50px; padding: 8px 24px;
  font-size: 14px; color: #FF2EB3;
  display: inline-block;
}
</style>
</head>
<body>
<h1>💦 FIENOES PLONST!</h1>
<div class="sub">De klassieke fail-pagina van Fienoes</div>
<img src="fienoes-plonst.png" alt="Fienoes Plonst!">
<div class="caption">"Oeps! Fienoes plonst! Gemist: 2×"</div>
<div class="badge">🐱 Fienoes zegt: probeer het nog eens!</div>

<!-- VOICE BUTTON -->
<div id="voice-bar" style="position:fixed;bottom:16px;right:16px;z-index:999;display:flex;gap:8px;align-items:center;">
  <button id="voice-btn" onclick="toggleVoice()" style="background:linear-gradient(135deg,#B100FF,#FF2EB3);color:#fff;border:none;padding:10px 18px;border-radius:50px;font-size:14px;font-weight:bold;cursor:pointer;box-shadow:0 0 15px rgba(177,0,255,0.5);">🔊 Lees voor</button>
  <button id="voice-stop" onclick="stopVoice()" style="display:none;background:rgba(0,0,0,0.6);color:#fff;border:2px solid #FF2EB3;padding:8px 14px;border-radius:50px;font-size:13px;cursor:pointer;">⏹ Stop</button>
</div>
<script>
const VOICE_TEXT = `Oeps! Fienoes plonst! Dat was niet de bedoeling. Maar weet je wat? Iedereen maakt fouten. Het gaat erom dat je het opnieuw probeert. Kom op, ga terug en probeer het nog eens!`;
let synth = window.speechSynthesis;
let speaking = false;
function getVoice() {
  const v = synth.getVoices();
  return v.find(x => x.lang==='nl-NL'||x.lang==='nl-BE'||x.lang.startsWith('nl')) || v[0];
}
function toggleVoice() { if(speaking){stopVoice();return;} startVoice(); }
function startVoice() {
  if(synth.speaking) synth.cancel();
  const u = new SpeechSynthesisUtterance(VOICE_TEXT);
  u.lang='nl-NL'; u.rate=0.95; u.pitch=1.05;
  const voice=getVoice(); if(voice) u.voice=voice;
  u.onstart=()=>{ speaking=true; document.getElementById('voice-btn').textContent='⏸ Pauze'; document.getElementById('voice-stop').style.display='inline-block'; };
  u.onend=u.onerror=()=>{ speaking=false; document.getElementById('voice-btn').textContent='🔊 Lees voor'; document.getElementById('voice-stop').style.display='none'; };
  synth.speak(u);
}
function stopVoice() { synth.cancel(); speaking=false; document.getElementById('voice-btn').textContent='🔊 Lees voor'; document.getElementById('voice-stop').style.display='none'; }
if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=()=>{};
<\/script>

</body>
</html>
