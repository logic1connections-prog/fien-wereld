<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fien's Portret</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(ellipse at center, #1a0833, #050010);
  color: #fff; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px; text-align: center;
}
h1 {
  font-size: 24px; color: #FF2EB3;
  text-shadow: 0 0 18px #FF2EB3; margin-bottom: 20px; letter-spacing: 2px;
}
.portrait {
  width: 260px; height: 260px; object-fit: cover; object-position: top;
  border-radius: 50%; border: 4px solid #FF2EB3;
  box-shadow: 0 0 30px rgba(255,46,179,0.6); margin-bottom: 20px;
}
.badges {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; margin-bottom: 20px;
}
.badge {
  background: rgba(177,0,255,0.2); border: 2px solid #B100FF;
  border-radius: 50px; padding: 8px 18px;
  font-size: 13px; font-weight: bold;
  box-shadow: 0 0 10px rgba(177,0,255,0.3);
}
.badge.pink { border-color: #FF2EB3; background: rgba(255,46,179,0.15); box-shadow: 0 0 10px rgba(255,46,179,0.3); }
.badge.blue { border-color: #00AFFF; background: rgba(0,175,255,0.15); box-shadow: 0 0 10px rgba(0,175,255,0.3); }
.badge.gold { border-color: #FFD700; background: rgba(255,215,0,0.15); box-shadow: 0 0 10px rgba(255,215,0,0.3); }
.quote {
  background: rgba(0,0,0,0.5); border: 2px solid #FF2EB3;
  border-radius: 16px; padding: 16px 24px;
  font-style: italic; font-size: 15px; color: #FF2EB3;
  text-shadow: 0 0 8px rgba(255,46,179,0.5);
  max-width: 500px; margin-bottom: 20px;
}
</style>
</head>
<body>
<h1>🌟 FIEN'S PORTRET</h1>
<img class="portrait" src="fien-portret.png" alt="Fien">
<div class="badges">
  <span class="badge pink">❤️ Lief</span>
  <span class="badge blue">💡 Slim</span>
  <span class="badge gold">⭐ Doorzetter</span>
  <span class="badge pink">🐾 Fienoes Fan</span>
</div>
<div class="quote">"Ik ben Fien. Ik ben lief, slim en ik geef nooit op — ook al plonst Fienoes soms in de wc."</div>
</body>
</html>
