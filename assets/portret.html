<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fien's Portret</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(ellipse at center, #1a0833, #050010);
  color: #fff; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px; text-align: center;
}
h1 {
  font-size: 24px; color: #FF2EB3;
  text-shadow: 0 0 18px #FF2EB3; margin-bottom: 20px; letter-spacing: 2px;
}
.portrait {
  width: 260px; height: 260px; object-fit: cover; object-position: top;
  border-radius: 50%; border: 4px solid #FF2EB3;
  box-shadow: 0 0 30px rgba(255,46,179,0.6); margin-bottom: 20px;
}
.badges {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; margin-bottom: 20px;
}
.badge {
  background: rgba(177,0,255,0.2); border: 2px solid #B100FF;
  border-radius: 50px; padding: 8px 18px;
  font-size: 13px; font-weight: bold;
  box-shadow: 0 0 10px rgba(177,0,255,0.3);
}
.badge.pink { border-color: #FF2EB3; background: rgba(255,46,179,0.15); box-shadow: 0 0 10px rgba(255,46,179,0.3); }
.badge.blue { border-color: #00AFFF; background: rgba(0,175,255,0.15); box-shadow: 0 0 10px rgba(0,175,255,0.3); }
.badge.gold { border-color: #FFD700; background: rgba(255,215,0,0.15); box-shadow: 0 0 10px rgba(255,215,0,0.3); }
.quote {
  background: rgba(0,0,0,0.5); border: 2px solid #FF2EB3;
  border-radius: 16px; padding: 16px 24px;
  font-style: italic; font-size: 15px; color: #FF2EB3;
  text-shadow: 0 0 8px rgba(255,46,179,0.5);
  max-width: 500px; margin-bottom: 20px;
}
</style>
</head>
<body>
<h1>🌟 FIEN'S PORTRET</h1>
<img class="portrait" src="fien-portret.png" alt="Fien">
<div class="badges">
  <span class="badge pink">❤️ Lief</span>
  <span class="badge blue">💡 Slim</span>
  <span class="badge gold">⭐ Doorzetter</span>
  <span class="badge pink">🐾 Fienoes Fan</span>
</div>
<div class="quote">"Ik ben Fien. Ik ben lief, slim en ik geef nooit op — ook al plonst Fienoes soms in de wc."</div>

<!-- VOICE BUTTON -->
<div id="voice-bar" style="position:fixed;bottom:16px;right:16px;z-index:999;display:flex;gap:8px;align-items:center;">
  <button id="voice-btn" onclick="toggleVoice()" style="background:linear-gradient(135deg,#B100FF,#FF2EB3);color:#fff;border:none;padding:10px 18px;border-radius:50px;font-size:14px;font-weight:bold;cursor:pointer;box-shadow:0 0 15px rgba(177,0,255,0.5);">🔊 Lees voor</button>
  <button id="voice-stop" onclick="stopVoice()" style="display:none;background:rgba(0,0,0,0.6);color:#fff;border:2px solid #FF2EB3;padding:8px 14px;border-radius:50px;font-size:13px;cursor:pointer;">⏹ Stop</button>
</div>
<script>
const VOICE_TEXT = `Dit is Fien! Fien is lief, slim en een echte doorzetter. Ze geeft nooit op, ook als het moeilijk is. En ze is de grootste fan van Fienoes, haar trouwe kat. Wat is jouw superkracht?`;
let synth = window.speechSynthesis;
let speaking = false;
function getVoice() {
  const v = synth.getVoices();
  return v.find(x => x.lang==='nl-NL'||x.lang==='nl-BE'||x.lang.startsWith('nl')) || v[0];
}
function toggleVoice() { if(speaking){stopVoice();return;} startVoice(); }
function startVoice() {
  if(synth.speaking) synth.cancel();
  const u = new SpeechSynthesisUtterance(VOICE_TEXT);
  u.lang='nl-NL'; u.rate=0.95; u.pitch=1.05;
  const voice=getVoice(); if(voice) u.voice=voice;
  u.onstart=()=>{ speaking=true; document.getElementById('voice-btn').textContent='⏸ Pauze'; document.getElementById('voice-stop').style.display='inline-block'; };
  u.onend=u.onerror=()=>{ speaking=false; document.getElementById('voice-btn').textContent='🔊 Lees voor'; document.getElementById('voice-stop').style.display='none'; };
  synth.speak(u);
}
function stopVoice() { synth.cancel(); speaking=false; document.getElementById('voice-btn').textContent='🔊 Lees voor'; document.getElementById('voice-stop').style.display='none'; }
if(synth.onvoiceschanged!==undefined) synth.onvoiceschanged=()=>{};
<\/script>

</body>
</html>
