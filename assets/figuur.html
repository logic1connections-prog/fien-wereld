<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welk figuur ben jij vandaag?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #2a0a4a 0%, #0a0014 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .stars {
    position: fixed; inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, #B100FF, transparent),
      radial-gradient(2px 2px at 60% 70%, #FF2EB3, transparent),
      radial-gradient(1px 1px at 50% 50%, #00AFFF, transparent),
      radial-gradient(2px 2px at 80% 10%, #B100FF, transparent),
      radial-gradient(1px 1px at 10% 90%, #FF2EB3, transparent);
    animation: twinkle 4s infinite;
    z-index: 0; pointer-events: none;
  }
  @keyframes twinkle { 0%,100%{opacity:.4} 50%{opacity:1} }

  .container {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 18px;
    min-height: 100vh;
  }
  .scene {
    background: rgba(0, 0, 0, 0.45);
    border: 2px solid #FF2EB3;
    border-radius: 22px;
    padding: 24px;
    box-shadow: 0 0 35px rgba(255, 46, 179, 0.4);
    animation: fadeIn 0.5s ease-out;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

  h1 {
    text-align: center;
    color: #B100FF;
    text-shadow: 0 0 20px #B100FF, 0 0 40px #B100FF;
    font-size: 30px;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .subtitle {
    text-align: center;
    color: #00AFFF;
    text-shadow: 0 0 12px #00AFFF;
    margin-bottom: 16px;
    font-size: 16px;
  }
  .question {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
    color: #fff;
    font-weight: 600;
    line-height: 1.3;
  }
  .progress {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .pdot {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid #B100FF;
    transition: all 0.3s;
  }
  .pdot.done { background: #FF2EB3; box-shadow: 0 0 10px #FF2EB3; }
  .pdot.current { background: #00AFFF; box-shadow: 0 0 12px #00AFFF; transform: scale(1.2); }

  .options {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr;
  }
  @media (min-width: 600px) {
    .options { grid-template-columns: 1fr 1fr; }
  }
  .option-btn {
    background: linear-gradient(135deg, rgba(177, 0, 255, 0.25), rgba(255, 46, 179, 0.25));
    color: #fff;
    border: 2px solid #FF2EB3;
    padding: 18px 16px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    text-align: left;
    font-size: 17px;
    font-weight: 600;
    box-shadow: 0 0 14px rgba(255, 46, 179, 0.3);
    line-height: 1.3;
  }
  .option-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 25px rgba(255, 46, 179, 0.7);
    background: linear-gradient(135deg, rgba(177, 0, 255, 0.45), rgba(255, 46, 179, 0.45));
  }
  .option-btn:active { transform: scale(0.98); }
  .option-emoji {
    font-size: 28px;
    margin-right: 8px;
  }

  .start-screen { text-align: center; }
  .start-img {
    width: 100%;
    max-width: 600px;
    border-radius: 16px;
    margin: 16px auto;
    box-shadow: 0 0 30px rgba(177, 0, 255, 0.6);
    border: 2px solid #B100FF;
    display: block;
  }
  .btn-go {
    background: linear-gradient(135deg, #B100FF, #FF2EB3);
    color: #fff;
    border: none;
    padding: 18px 40px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(255, 46, 179, 0.7);
    transition: all 0.2s;
    font-family: inherit;
    margin-top: 14px;
    letter-spacing: 1px;
  }
  .btn-go:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(255, 46, 179, 1); }
  .btn-go:active { transform: scale(0.98); }

  .result {
    text-align: center;
  }
  .result-intro {
    font-size: 18px;
    color: #00AFFF;
    text-shadow: 0 0 12px #00AFFF;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .character-img {
    width: 100%;
    max-width: 380px;
    border-radius: 18px;
    margin: 14px auto;
    box-shadow: 0 0 40px var(--glow, #B100FF);
    border: 3px solid var(--glow, #FF2EB3);
    display: block;
    animation: bounceIn 0.7s ease-out;
  }
  @keyframes bounceIn {
    0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
    60% { transform: scale(1.1) rotate(3deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .result h2 {
    font-size: 38px;
    color: var(--glow, #FF2EB3);
    text-shadow: 0 0 22px var(--glow, #FF2EB3);
    margin: 12px 0 8px;
    letter-spacing: 1px;
  }
  .tagline {
    font-size: 20px;
    margin-bottom: 16px;
    color: #fff;
    font-style: italic;
  }
  .description {
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 16px;
    background: rgba(177, 0, 255, 0.15);
    padding: 18px;
    border-radius: 14px;
    border: 1px solid var(--glow, #B100FF);
    text-align: left;
  }
  .fienoes-quote {
    font-size: 17px;
    background: rgba(255, 46, 179, 0.2);
    border-left: 4px solid #FF2EB3;
    padding: 14px 16px;
    border-radius: 8px;
    margin-bottom: 18px;
    text-align: left;
    font-style: italic;
  }
  .fienoes-quote strong { color: #FF2EB3; text-shadow: 0 0 8px #FF2EB3; }

  .feedback {
    background: rgba(0, 175, 255, 0.15);
    border-left: 4px solid #00AFFF;
    padding: 12px 14px;
    border-radius: 8px;
    margin-top: 14px;
    font-size: 15px;
    font-style: italic;
    animation: slideIn 0.4s ease-out;
    color: #fff;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .feedback strong { color: #FF2EB3; }

  .confetti {
    position: fixed;
    width: 12px; height: 12px;
    pointer-events: none;
    z-index: 1000;
    animation: confettiFall 2.5s linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-50px) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 500px) {
    h1 { font-size: 22px; }
    .question { font-size: 18px; }
    .option-btn { font-size: 15px; padding: 14px 12px; }
    .result h2 { font-size: 28px; }
  }
</style>
</head>

<div class="stars"></div>
<div class="container">
  <div class="scene" id="scene"></div>
</div>

    ]

  {
    vraag: "Iemand pakt jouw stoel. Wat doe je?",
    opties: [
      { emoji: "🐺", label: "Pak hem terug. Eind discussie.", punten: { wolf: 3, plofkip: 1 }, fb: "Klaar." },
      { emoji: "🐔", label: "ONTPLOFFEN. Iedereen weet het.", punten: { plofkip: 3, lama: 1 }, fb: "De hele klas weet het nu." },
      { emoji: "🦥", label: "Andere stoel. Boeit niet echt.", punten: { slow: 3, beer: 2 }, fb: "Wijze keuze. Of luiheid. Allebei goed." },
      { emoji: "🦙", label: "'ECHT? DIT KAN NIET WAAR ZIJN.'", punten: { lama: 3, plofkip: 1 }, fb: "Drama mode: aan." },
      { emoji: "🦊", label: "Plan smeden. Stoel komt terug. Anders.", punten: { vos: 3, wolf: 1 }, fb: "Wraak in stilte. Mooi." },
      { emoji: "🐻", label: "Niks zeggen. Naast staan tot ze 't snappen.", punten: { beer: 3, vos: 1 }, fb: "Ze gaan zich rot voelen. Dat is genoeg." }

      { emoji: "🦥", label: "Half slapend. Lichaam aanwezig.", punten: { slow: 3, beer: 1 }, fb: "Geest komt later wel bij." },
      { emoji: "🦙", label: "'IK KAN DIT NIET. NIET VANDAAG.'", punten: { lama: 3, plofkip: 1 }, fb: "Tragische held." },
      { emoji: "🦊", label: "Iemands huiswerk overpennen.", punten: { vos: 3, slow: 1 }, fb: "Meesterzet." },

let huidigeVraag = 0;
let scores = {};
let lastAnswer = null;

function maakProgress() {
  let html = '<div class="progress">';
  for (let i = 0; i < VRAGEN.length; i++) {
    let cls = 'pdot';
    if (i < huidigeVraag) cls += ' done';
    if (i === huidigeVraag) cls += ' current';
    html += `<div class="${cls}"></div>`;
  }
  return html + '</div>';
}

function toonStart() {
  const scene = document.getElementById('scene');
  scene.innerHTML = `
    <div class="start-screen">
      <h1>WELK FIGUUR BEN JIJ VANDAAG?</h1>
      <div class="subtitle">3 vragen. Geen verkeerd antwoord. Eerlijk zijn.</div>
      <img src="${IMG.start}" alt="" class="start-img">
      <button class="btn-go" onclick="start()">START 🚀</button>
    </div>
  `;
}

function start() {
  huidigeVraag = 0;
  scores = { wolf: 0, plofkip: 0, slow: 0, lama: 0, vos: 0, beer: 0 };
  lastAnswer = null;
  toonVraag();
}

function toonVraag() {
  if (huidigeVraag >= VRAGEN.length) {
    toonResultaat();
    return;
  }
  const v = VRAGEN[huidigeVraag];
  const scene = document.getElementById('scene');
  scene.style.animation = 'none';
  void scene.offsetWidth;
  scene.style.animation = 'fadeIn 0.5s ease-out';

  scene.innerHTML = `
    ${maakProgress()}
    <div class="question">${v.vraag}</div>
    <div class="options">
      ${v.opties.map((o, i) => `
        <button class="option-btn" onclick="kies(${i})">
          <span class="option-emoji">${o.emoji}</span>${o.label}
        </button>
      `).join('')}
    </div>
    ${lastAnswer ? `<div class="feedback"><strong>Fienoes:</strong> ${lastAnswer}</div>` : ''}
  `;
}

function kies(idx) {
  const optie = VRAGEN[huidigeVraag].opties[idx];
  for (const fig in optie.punten) {
    scores[fig] = (scores[fig] || 0) + optie.punten[fig];
  }
  lastAnswer = optie.fb;
  huidigeVraag++;
  setTimeout(toonVraag, 280);
}

function toonResultaat() {
  let winnaar = 'wolf';
  let max = -1;
  for (const fig in scores) {
    if (scores[fig] > max) {
      max = scores[fig];
      winnaar = fig;
    }
  }
  const f = FIGUREN[winnaar];

  // confetti
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      const colors = ['#B100FF', '#FF2EB3', '#00AFFF', '#FFD700', '#00FF88', '#FF6600'];
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-20px';
      c.style.animationDelay = Math.random() * 0.6 + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 40);
  }

  const scene = document.getElementById('scene');
  scene.style.animation = 'none';
  void scene.offsetWidth;
  scene.style.animation = 'fadeIn 0.5s ease-out';

  scene.innerHTML = `
    <div class="result" style="--glow: ${f.glow};">
      <div class="result-intro">VANDAAG BEN JIJ...</div>
      <img src="${f.img}" alt="${f.naam}" class="character-img">
      <h2>${f.naam}</h2>
      <div class="tagline">"${f.tagline}"</div>
      <div class="description">${f.description}</div>
      <div class="fienoes-quote"><strong>Fienoes zegt:</strong> ${f.fienoes}</div>
      <button class="btn-go" onclick="start()">🔄 OPNIEUW</button>
    </div>
  `;
}

toonStart();
</script>
